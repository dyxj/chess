version: '3'

vars:
  GO_CMD: go

tasks:
  build:
    desc: "Build game-server binary"
    dir: ./cmd/game-server
    cmds:
      - |
        {{.GO_CMD}} build -o ../../game-server

  build-if-needed:
    desc: "Build game-server binary only if it doesn't exist"
    internal: true
    vars:
      PREFIX: '{{splitList ":" .TASK | first}}'
    status:
      - test -f ./game-server
    cmds:
      - task {{.PREFIX}}:build

  run-local:
    desc: "Run game-server. Build binary if does not exist"
    deps: [build-if-needed]
    dotenv: [.env.local]
    cmds:
      - |
        ./game-server

  docker-build:
    desc: "Build game-server Docker image"
    cmds:
      - docker build -t dyxj/chess-game-server {{.ROOT_DIR}}

  docker-run:
    desc: "Run game-server Docker image"
    cmds:
      - |
        docker run --rm \
          -e HOST=0.0.0.0 \
          -e PORT=8080 \
          -e READ_HEADER_TIMEOUT=5s \
          -e READ_TIMEOUT=10s \
          -e IDLE_TIMEOUT=60s \
          -e HANDLER_TIMEOUT=30s \
          -e SHUT_DOWN_TIMEOUT=10s \
          -e SHUT_DOWN_HARD_TIMEOUT=15s \
          -e SHUT_DOWN_READY_DELAY=5s \
          -p 8080:8080 \
          dyxj/chess-game-server

